name: Deploy to Apps Script

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'dashboard.js'
      - 'appscript/**'
      - 'scripts/**'
      - '.github/workflows/deploy-appscript.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        env:
          CLASPRC: ${{ secrets.CLASPRC_JSON }}
        run: printenv CLASPRC > ~/.clasprc.json

      - name: Write clasp project config
        run: |
          echo '{"scriptId":"15ZDwJzbYqFVtVc5e4TGl7yEWZFVKq2pQl-RyOKw8vsVnAGBqWrkSO19K","rootDir":"appscript"}' > .clasp.json

      - name: Build Apps Script Dashboard (HTML shell + external JS)
        run: python3 scripts/build-appscript.py

      - name: Verify clasp credentials
        run: node -e "JSON.parse(require('fs').readFileSync(require('os').homedir()+'/.clasprc.json','utf8')); console.log('clasprc.json is valid JSON')"

      - name: Push to Apps Script
        run: clasp push --force

      - name: Update web app deployment
        run: clasp deploy -i AKfycbzS_oGaTWaXlfhWHAaQR5QE5nxw8Gm9sx4Q7pjZXoBMPGqWybUDKjFK7GB2ya9h96-f -d "Auto-deploy from commit ${{ github.sha }}"
